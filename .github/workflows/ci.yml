name: SwiftShare CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Backend Tests
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build backend
        working-directory: ./backend
        run: cargo build --verbose
      
      - name: Run backend tests
        working-directory: ./backend
        run: cargo test --verbose
      
      - name: Run backend clippy
        working-directory: ./backend
        run: cargo clippy -- -D warnings
      
      - name: Run backend fmt check
        working-directory: ./backend
        run: cargo fmt -- --check

  # Desktop Tests
  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      
      - name: Install desktop dependencies
        working-directory: ./desktop
        run: npm ci
      
      - name: Run desktop tests
        working-directory: ./desktop
        run: npm test -- --coverage --watchAll=false
      
      - name: Run desktop lint
        working-directory: ./desktop
        run: npm run lint
      
      - name: Build desktop
        working-directory: ./desktop
        run: npm run build

  # Mobile Tests
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Enable web
        run: flutter config --enable-web
      
      - name: Get dependencies
        working-directory: ./mobile
        run: flutter pub get
      
      - name: Analyze project source
        working-directory: ./mobile
        run: flutter analyze
      
      - name: Run tests
        working-directory: ./mobile
        run: flutter test
      
      - name: Build APK
        working-directory: ./mobile
        run: flutter build apk --debug

  # Web Tests
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      
      - name: Install web dependencies
        working-directory: ./web
        run: npm ci
      
      - name: Run web tests
        working-directory: ./web
        run: npm test -- --coverage --watchAll=false
      
      - name: Run web lint
        working-directory: ./web
        run: npm run lint
      
      - name: Build web
        working-directory: ./web
        run: npm run build

  # Docker Build
  docker:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t swiftshare:latest .
      
      - name: Test Docker image
        run: |
          docker run -d --name swiftshare-test -p 8080:8080 -p 8081:8081 swiftshare:latest
          sleep 10
          curl -f http://localhost:8080/health || exit 1
          docker stop swiftshare-test
          docker rm swiftshare-test

  # Security Scan
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Release
  release:
    runs-on: ubuntu-latest
    needs: [backend, desktop, mobile, web, docker, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Changes in this Release:
            - Backend improvements
            - Desktop app updates
            - Mobile app enhancements
            - Web interface additions
          draft: false
          prerelease: false
      
      - name: Build and upload backend artifacts
        run: |
          cd backend
          cargo build --release
          tar -czf swiftshare-backend-${{ github.run_number }}.tar.gz target/release/swiftshare-backend
      
      - name: Upload backend artifacts
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./backend/swiftshare-backend-${{ github.run_number }}.tar.gz
          asset_name: swiftshare-backend-${{ github.run_number }}.tar.gz
          asset_content_type: application/gzip 