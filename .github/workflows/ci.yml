name: SwiftShare CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read
  security-events: write

jobs:
  # Backend Tests
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build backend
        working-directory: ./backend
        run: cargo build --verbose
      
      - name: Run backend tests
        working-directory: ./backend
        run: cargo test --verbose
      
      - name: Run backend clippy
        working-directory: ./backend
        run: cargo clippy
      
      - name: Run backend fmt check
        working-directory: ./backend
        run: cargo fmt -- --check

  # Desktop Tests
  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      
      - name: Install desktop dependencies
        working-directory: ./desktop
        run: npm ci
      
      - name: Run desktop tests
        working-directory: ./desktop
        run: npm test -- --coverage --watchAll=false --passWithNoTests
      
      - name: Build desktop
        working-directory: ./desktop
        run: npm run build

  # Mobile Tests
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
      
      - name: Enable web
        run: flutter config --enable-web
      
      - name: Get dependencies
        working-directory: ./mobile
        run: flutter pub get
      
      - name: Analyze project source
        working-directory: ./mobile
        run: flutter analyze || true
      
      - name: Run tests
        working-directory: ./mobile
        run: flutter test
      
      - name: Build APK
        working-directory: ./mobile
        run: flutter build apk --debug

  # Web Tests
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: web-frontend/package-lock.json
      
      - name: Install web dependencies
        working-directory: ./web-frontend
        run: npm ci
      
      - name: Run web lint
        working-directory: ./web-frontend
        run: npm run lint
      
      - name: Build web
        working-directory: ./web-frontend
        run: npm run build

  # Docker Build
  docker:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t swiftshare:latest .
      
      - name: Test Docker image
        run: |
          docker run -d --name swiftshare-test -p 3001:3001 swiftshare:latest
          sleep 10
          curl -f http://localhost:3001/health || exit 1
          docker stop swiftshare-test
          docker rm swiftshare-test

  # Security Scan
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name == 'push'
        with:
          sarif_file: 'trivy-results.sarif'

  # Release
  release:
    runs-on: ubuntu-latest
    needs: [backend, desktop, mobile, web, docker, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write        # ← overrides top-level contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build backend release binary
        working-directory: ./backend
        run: |
          cargo build --release
          tar -czf swiftshare-backend-${{ github.run_number }}.tar.gz target/release/swiftshare-backend

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Changes in this Release:
            - Backend improvements
            - Desktop app updates
            - Mobile app enhancements
            - Web interface additions
          draft: false
          prerelease: false
          files: ./backend/swiftshare-backend-${{ github.run_number }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
