<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwiftShare - File Sharing Made Simple</title>
    <meta name="description" content="Upload files and get a shareable link with QR code. No registration required. Fast, secure, and free file sharing." />
    <meta name="keywords" content="file sharing, file transfer, share files, SwiftShare, send files, QR code file share" />
    <meta name="author" content="SwiftShare" />
    <meta name="robots" content="index,follow" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://swift-share-tau.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:title" content="SwiftShare - File Sharing Made Simple" />
    <meta property="og:description" content="Upload files and get a shareable link with QR code. No registration required. Fast, secure, and free file sharing." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://swift-share-tau.vercel.app/" />
    <meta property="og:site_name" content="SwiftShare" />
    <meta property="og:image" content="https://swift-share-tau.vercel.app/favicon.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SwiftShare - File Sharing Made Simple" />
    <meta name="twitter:description" content="Upload files and get a shareable link with QR code. No registration required. Fast, secure, and free file sharing." />
    <meta name="twitter:image" content="https://swift-share-tau.vercel.app/favicon.svg" />

    <!-- Structured data: WebSite / Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "SwiftShare",
          "url": "https://swift-share-tau.vercel.app/",
          "logo": "https://swift-share-tau.vercel.app/favicon.svg"
        },
        {
          "@type": "WebSite",
          "url": "https://swift-share-tau.vercel.app/",
          "name": "SwiftShare",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://swift-share-tau.vercel.app/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
